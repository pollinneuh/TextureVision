<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBP Texture Recognition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400,700&family=Special+Elite&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier Prime', 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; height: 100vh; overflow: hidden; }
        .header { background: #1a1a1a; color: #fff; padding: 20px 30px; border-bottom: 3px solid #333; }
        .header h1 { font-size: 24px; font-family: 'Special Elite', monospace; letter-spacing: 2px; text-transform: uppercase; }
        .header h1::before { content: '> '; }
        .main-container { display: flex; height: calc(100vh - 84px); }
        .panel { background: #1a1a1a; border: 2px solid #333; display: flex; flex-direction: column; flex: 1; }
        .left-panel { border-right: 2px solid #333; }
        .panel-header { background: #0a0a0a; padding: 15px 20px; border-bottom: 2px solid #333; font-weight: 700; color: #fff; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; font-size: 13px; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; background: #0a0a0a; }
        .panel-content::-webkit-scrollbar { width: 10px; }
        .panel-content::-webkit-scrollbar-track { background: #0a0a0a; }
        .panel-content::-webkit-scrollbar-thumb { background: #333; }
        .upload-area { border: 3px dashed #444; padding: 50px; text-align: center; cursor: pointer; background: #1a1a1a; margin-bottom: 20px; transition: all 0.3s; }
        .upload-area:hover { border-color: #666; background: #252525; }
        .upload-area.dragover { border-color: #888; background: #2a2a2a; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        .upload-text { color: #999; font-size: 14px; }
        .upload-text strong { color: #fff; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .image-item { position: relative; border: 2px solid #333; background: #000; }
        .image-item:hover { border-color: #666; }
        .image-item img { width: 100%; height: 140px; object-fit: cover; display: block; filter: grayscale(100%) contrast(1.2); }
        .image-item .remove-btn { position: absolute; top: 5px; right: 5px; background: #000; color: #fff; border: 2px solid #fff; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: none; align-items: center; justify-content: center; }
        .image-item:hover .remove-btn { display: flex; }
        .image-item .remove-btn:hover { background: #fff; color: #000; }
        .result-item { background: #1a1a1a; border: 2px solid #333; padding: 20px; margin-bottom: 20px; }
        .result-header { display: flex; gap: 20px; margin-bottom: 15px; }
        .result-image { width: 100px; height: 100px; border: 2px solid #333; object-fit: cover; filter: grayscale(100%) contrast(1.2); }
        .result-info { flex: 1; }
        .result-info h3 { font-family: 'Special Elite', monospace; margin-bottom: 10px; color: #fff; text-transform: uppercase; font-size: 13px; }
        .texture-row { margin-bottom: 12px; }
        .texture-label { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        .texture-label::before { content: '▸ '; color: #666; }
        .confidence-container { display: flex; align-items: center; gap: 10px; }
        .confidence-value { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; color: #fff; min-width: 45px; text-align: right; }.texture-tag { display: inline-block; background: #fff; color: #000; padding: 5px 10px; border: 2px solid #000; font-size: 11px; font-weight: 700; margin-right: 5px; margin-bottom: 5px; text-transform: uppercase; }
        .confidence-bar { flex: 1; background: #0a0a0a; border: 1px solid #333; height: 20px; position: relative; }
        .confidence-fill { background: repeating-linear-gradient(45deg, #fff, #fff 8px, #ccc 8px, #ccc 16px); height: 100%; transition: width 0.5s; }
        .btn { background: #fff; color: #000; border: 3px solid #000; padding: 12px 24px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: 'Courier Prime', monospace; text-transform: uppercase; transition: all 0.2s; box-shadow: 4px 4px 0 #000; }
        .btn:hover:not(:disabled) { background: #000; color: #fff; transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
        .btn:disabled { background: #333; color: #666; border-color: #333; cursor: not-allowed; box-shadow: none; }
        .btn-secondary { background: #1a1a1a; color: #fff; border: 2px solid #fff; box-shadow: 2px 2px 0 #fff; padding: 8px 16px; font-size: 11px; }
        .btn-secondary:hover { background: #fff; color: #000; }
        .spinner { border: 3px solid #333; border-top: 3px solid #fff; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .empty-state { text-align: center; color: #666; padding: 80px 20px; }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
        .empty-state h3 { font-family: 'Special Elite', monospace; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .process-container { margin-top: 20px; text-align: center; padding: 20px; border: 1px dashed #333; background: #1a1a1a; }
        .lbp-info { background: #1a1a1a; border: 2px solid #333; padding: 15px; margin-bottom: 20px; font-size: 11px; color: #999; }
        .lbp-info strong { color: #fff; }
        .status-badge { padding: 6px 12px; font-size: 10px; font-weight: 700; border: 2px solid; text-transform: uppercase; }
        .status-processing { background: #1a1a1a; color: #fff; border-color: #fff; }
        .status-complete { background: #fff; color: #000; border-color: #000; }
    </style>
</head>
<body>
    <div class="header"><h1>LBP Texture Recognition</h1></div>
    <div class="main-container">
        <div class="panel left-panel">
            <div class="panel-header">
                <span>█ INPUT IMAGES</span>
                <button class="btn btn-secondary" onclick="clearImages()">Clear All</button>
            </div>
            <div class="panel-content">
                <div class="lbp-info"><strong>LBP DETECTOR:</strong> Local Binary Patterns for texture analysis</div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">▲</div>
                    <div class="upload-text"><strong>CLICK TO UPLOAD</strong> or drag and drop<br><small>PNG, JPG, GIF</small></div>
                </div>
                <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
                <div class="image-grid" id="imageGrid"></div>
                <div class="process-container">
                    <button class="btn" id="processBtn" onclick="processImages()" disabled>▶ ANALYZE TEXTURES</button>
                </div>
            </div>
        </div>
        <div class="panel right-panel">
            <div class="panel-header">
                <span>█ ANALYSIS RESULTS</span>
                <span class="status-badge" id="statusBadge" style="display:none;"></span>
            </div>
            <div class="panel-content" id="resultsPanel">
                <div class="empty-state">
                    <div class="empty-state-icon">◆</div>
                    <h3>NO RESULTS YET</h3>
                    <p>Upload images and click analyze</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        let uploadedImages = [];
        const textureTypes = ['SMOOTH', 'ROUGH', 'BUMPY', 'FABRIC', 'WOOD GRAIN', 'METALLIC', 'STONE', 'ORGANIC'];
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadedImages.push({ id: Date.now() + Math.random(), src: e.target.result, name: file.name });
                        renderImageGrid();
                        updateProcessButton();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function renderImageGrid() {
            document.getElementById('imageGrid').innerHTML = uploadedImages.map(img => `
                <div class="image-item">
                    <img src="${img.src}" alt="${img.name}">
                    <button class="remove-btn" onclick="removeImage(${img.id})">×</button>
                </div>
            `).join('');
        }

        function removeImage(id) {
            uploadedImages = uploadedImages.filter(img => img.id !== id);
            renderImageGrid();
            updateProcessButton();
        }

        function clearImages() {
            uploadedImages = [];
            renderImageGrid();
            updateProcessButton();
            showEmptyState();
        }

        function updateProcessButton() {
            document.getElementById('processBtn').disabled = uploadedImages.length === 0;
        }

        function showEmptyState() {
            document.getElementById('resultsPanel').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">◆</div>
                    <h3>NO RESULTS YET</h3>
                    <p>Upload images and click analyze</p>
                </div>
            `;
            document.getElementById('statusBadge').style.display = 'none';
        }
        
        async function processImages() {
    const resultsPanel = document.getElementById('resultsPanel');
    const statusBadge = document.getElementById('statusBadge');
    
    resultsPanel.innerHTML = '<div class="spinner"></div>';
    statusBadge.textContent = 'PROCESSING...';
    statusBadge.className = 'status-badge status-processing';
    statusBadge.style.display = 'inline-block';

    try {

        const response = await fetch('http://localhost:5000/analyze', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                images: uploadedImages
            })
        });

        const data = await response.json();
        
        if (data.error) {
            resultsPanel.innerHTML = `<div class="empty-state"><h3>ERROR</h3><p>${data.error}</p></div>`;
            return;
        }

        // Display real results from LBP algorithm
        resultsPanel.innerHTML = data.results.map(result => {
            const textures = result.textures || [];
            return `
                <div class="result-item">
                    <div class="result-header">
                        <img src="${result.src}" alt="${result.name}" class="result-image">
                        <div class="result-info">
                            <h3>${result.name}</h3>
                            ${textures.map(t => `
                                <div class="texture-row">
                                    <div class="texture-label">${t.name}</div>
                                    <div class="confidence-container">
                                        <div class="confidence-bar">
                                            <div class="confidence-fill" style="width: ${t.confidence}%"></div>
                                        </div>
                                        <div class="confidence-value">${t.confidence}%</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        statusBadge.textContent = 'COMPLETE';
        statusBadge.className = 'status-badge status-complete';
        
    } catch (error) {
        console.error('Error:', error);
        resultsPanel.innerHTML = `
            <div class="empty-state">
                <h3>CONNECTION ERROR</h3>
                <p>Make sure the Flask server is running:</p>
                <p style="font-family: monospace; color: #fff;">python server.py</p>
            </div>
        `;
        statusBadge.style.display = 'none';
    }
}

// Add model info display on load
window.addEventListener('DOMContentLoaded', async () => {
    try {
        const response = await fetch('http://localhost:5000/model-info');
        const info = await response.json();
        
        if (info.loaded) {
            console.log(`Model loaded: ${info.n_classes} classes`);
            console.log(`Classes: ${info.classes.join(', ')}`);
        }
    } catch (e) {
        console.warn('Backend not available');
    }
});
    </script>
</body>
</html>
